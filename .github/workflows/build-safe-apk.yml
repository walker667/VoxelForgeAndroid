name: BUILD SAFE APK ONLY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build safe APK
        run: |
          rm -rf extracted
          unzip -q AAA_VoxelForge_SAFE_FIXED.zip -d extracted
          PROJECT_DIR=$(find extracted -name settings.gradle -printf '%h\n' | head -n 1)
          echo "Building project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload safe APK
        uses: actions/upload-artifact@v4
        with:
          name: SAFE-VoxelForge-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
