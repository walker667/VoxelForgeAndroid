name: BUILD V3 REAL VOXEL OPENGL APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Create V3 OpenGL voxel Android project
        run: |
          rm -rf VoxelForgeV3
          mkdir -p VoxelForgeV3/app/src/main/java/com/voxelforge/v3
          mkdir -p VoxelForgeV3/app/src/main/res/values
          mkdir -p VoxelForgeV3/app/src/main/res/drawable
          mkdir -p VoxelForgeV3/app/src/main/assets/pack

          cat > VoxelForgeV3/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='VoxelForgeV3'
          include ':app'
          EOF

          cat > VoxelForgeV3/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > VoxelForgeV3/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          EOF

          cat > VoxelForgeV3/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.voxelforge.v3'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.voxelforge.v3'
                  minSdk 23
                  targetSdk 35
                  versionCode 30
                  versionName '3.0-opengl-voxel'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > VoxelForgeV3/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">Voxel Forge V3</string></resources>
          EOF

          cat > VoxelForgeV3/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowDisablePreview">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#5ee58a</item>
              </style>
          </resources>
          EOF

          cat > VoxelForgeV3/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:glEsVersion="0x00020000" android:required="true" />
              <application android:theme="@style/AppTheme" android:label="@string/app_name" android:allowBackup="false" android:resizeableActivity="false">
                  <activity android:name=".MainActivity" android:screenOrientation="landscape" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > VoxelForgeV3/app/src/main/java/com/voxelforge/v3/MainActivity.java <<'EOF'
          package com.voxelforge.v3;

          import android.app.Activity;
          import android.os.Bundle;
          import android.opengl.GLES20;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.FrameLayout;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.RectF;
          import java.nio.ByteBuffer;
          import java.nio.ByteOrder;
          import java.nio.FloatBuffer;
          import java.util.Random;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class MainActivity extends Activity {
              GameSurface surface;
              Hud hud;
              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  surface = new GameSurface(this);
                  hud = new Hud(this, surface.renderer);
                  FrameLayout layout = new FrameLayout(this);
                  layout.addView(surface);
                  layout.addView(hud);
                  setContentView(layout);
              }
              @Override protected void onPause(){ super.onPause(); surface.onPause(); surface.renderer.save(); }
              @Override protected void onResume(){ super.onResume(); surface.onResume(); }

              public static class GameSurface extends GLSurfaceView {
                  final VoxelRenderer renderer;
                  public GameSurface(Context c) {
                      super(c);
                      setEGLContextClientVersion(2);
                      renderer = new VoxelRenderer(c);
                      setRenderer(renderer);
                      setRenderMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);
                  }
              }

              public static class Hud extends View {
                  final VoxelRenderer r;
                  final Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
                  final Paint t = new Paint(Paint.ANTI_ALIAS_FLAG);
                  final RectF play = new RectF(), jump = new RectF(), brk = new RectF(), plc = new RectF(), pause = new RectF();
                  int pointerLook = -1, pointerJoy = -1;
                  float joyCX, joyCY, lastLookX, lastLookY;
                  public Hud(Context c, VoxelRenderer rr) {
                      super(c); r = rr; setFocusable(true);
                      t.setTextAlign(Paint.Align.CENTER); t.setFakeBoldText(true);
                  }
                  @Override protected void onDraw(Canvas c) {
                      int w=getWidth(), h=getHeight();
                      if(!r.started){ drawMenu(c,w,h); invalidate(); return; }
                      drawGameHud(c,w,h); invalidate();
                  }
                  void drawMenu(Canvas c,int w,int h){
                      p.setColor(Color.rgb(10,18,28)); c.drawRect(0,0,w,h,p);
                      for(int i=0;i<100;i++){
                          int x=(i*97)%Math.max(1,w); int y=(i*53)%Math.max(1,h);
                          p.setColor(new int[]{Color.rgb(58,172,78),Color.rgb(122,88,53),Color.rgb(120,125,132),Color.rgb(203,185,108)}[i%4]);
                          c.drawRect(x,y,x+38,y+38,p);
                      }
                      p.setColor(Color.argb(170,0,0,0)); c.drawRect(0,0,w,h,p);
                      t.setColor(Color.WHITE); t.setTextSize(64); c.drawText("Voxel Forge V3", w/2f, h*.25f, t);
                      t.setTextSize(23); t.setColor(Color.rgb(210,230,245)); c.drawText("OpenGL 3D voxel world - fixed visibility build", w/2f, h*.33f, t);
                      play.set(w/2f-220,h*.50f,w/2f+220,h*.50f+90); button(c, play, "PLAY", Color.rgb(43,160,88), 32);
                      t.setTextSize(18); t.setColor(Color.rgb(230,230,230)); c.drawText("Move: left joystick   Look: drag right side   Break / Place / Jump", w/2f, h*.72f, t);
                  }
                  void drawGameHud(Canvas c,int w,int h){
                      p.setColor(Color.argb(125,0,0,0)); c.drawRect(0,0,w,70,p);
                      t.setTextSize(16); t.setColor(Color.WHITE);
                      c.drawText("Seed 2027  FPS V3  X:"+(int)r.camX+" Z:"+(int)r.camZ+"  Blocks:"+r.edits, w/2f, 25, t);
                      c.drawText("This is not the tiny broken V1 - it is OpenGL cubes with fog, terrain, mobs, hotbar", w/2f, 52, t);
                      bar(c,20,18,r.health/20f,Color.rgb(230,60,60),"HP");
                      bar(c,20,43,r.hunger/20f,Color.rgb(245,170,55),"FOOD");
                      p.setColor(Color.argb(130,255,255,255)); c.drawCircle(115,h-115,78,p);
                      p.setColor(Color.rgb(45,58,74)); c.drawCircle(115+r.joyX*55,h-115+r.joyY*55,34,p);
                      jump.set(w-155,h-232,w-50,h-130); brk.set(w-290,h-116,w-170,h-28); plc.set(w-155,h-116,w-35,h-28); pause.set(w-76,18,w-18,62);
                      button(c,jump,"JUMP",Color.rgb(60,105,185),18); button(c,brk,"BREAK",Color.rgb(180,70,54),18); button(c,plc,"PLACE",Color.rgb(50,165,80),18); button(c,pause,r.paused?"▶":"Ⅱ",Color.rgb(70,75,85),20);
                      float sx=w/2f-250, y=h-64;
                      for(int i=0;i<r.hotbar.length;i++){
                          RectF slot=new RectF(sx+i*62,y,sx+i*62+54,y+54);
                          p.setColor(i==r.selected?Color.rgb(255,225,80):Color.argb(190,35,40,48)); c.drawRoundRect(slot,8,8,p);
                          p.setColor(r.blockColor(r.hotbar[i])); c.drawRect(slot.left+10,slot.top+10,slot.right-10,slot.bottom-10,p);
                      }
                      if(r.paused){ p.setColor(Color.argb(160,0,0,0)); c.drawRect(0,0,w,h,p); t.setTextSize(54); t.setColor(Color.WHITE); c.drawText("PAUSED",w/2f,h/2f,t); }
                  }
                  void bar(Canvas c,int x,int y,float v,int col,String label){
                      p.setColor(Color.rgb(45,45,52)); c.drawRect(x,y,x+140,y+15,p); p.setColor(col); c.drawRect(x,y,x+140*Math.max(0,Math.min(1,v)),y+15,p);
                      t.setTextAlign(Paint.Align.LEFT); t.setTextSize(12); t.setColor(Color.WHITE); c.drawText(label,x+148,y+13,t); t.setTextAlign(Paint.Align.CENTER);
                  }
                  void button(Canvas c,RectF rr,String s,int col,int size){
                      p.setColor(col); c.drawRoundRect(rr,14,14,p); p.setColor(Color.argb(60,255,255,255)); c.drawRoundRect(rr.left+4,rr.top+4,rr.right-4,rr.top+14,12,12,p);
                      t.setTextSize(size); t.setColor(Color.WHITE); c.drawText(s,rr.centerX(),rr.centerY()+size/3f,t);
                  }
                  @Override public boolean onTouchEvent(MotionEvent e){
                      int action=e.getActionMasked(); int idx=e.getActionIndex(); int id=e.getPointerId(idx); float x=e.getX(idx), y=e.getY(idx); int w=getWidth(), h=getHeight();
                      if(!r.started && action==MotionEvent.ACTION_DOWN){ if(play.contains(x,y)){ r.started=true; return true; } }
                      if(!r.started) return true;
                      if(action==MotionEvent.ACTION_DOWN || action==MotionEvent.ACTION_POINTER_DOWN){
                          if(pause.contains(x,y)){ r.paused=!r.paused; return true; }
                          if(jump.contains(x,y)){ r.jump(); return true; }
                          if(brk.contains(x,y)){ r.breakBlock(); return true; }
                          if(plc.contains(x,y)){ r.placeBlock(); return true; }
                          if(y>h-88 && Math.abs(x-w/2f)<285){ r.selected=Math.max(0,Math.min(r.hotbar.length-1,(int)((x-(w/2f-250))/62))); return true; }
                          if(x<w*.42f){ pointerJoy=id; joyCX=x; joyCY=y; } else { pointerLook=id; lastLookX=x; lastLookY=y; }
                      } else if(action==MotionEvent.ACTION_MOVE){
                          for(int i=0;i<e.getPointerCount();i++){
                              int pid=e.getPointerId(i); float px=e.getX(i), py=e.getY(i);
                              if(pid==pointerJoy){ r.joyX=clamp((px-115)/78f); r.joyY=clamp((py-(h-115))/78f); }
                              if(pid==pointerLook){ float dx=px-lastLookX, dy=py-lastLookY; r.yaw+=dx*.0065f; r.pitch=Math.max(-.85f,Math.min(.55f,r.pitch-dy*.0045f)); lastLookX=px; lastLookY=py; }
                          }
                      } else if(action==MotionEvent.ACTION_UP || action==MotionEvent.ACTION_POINTER_UP || action==MotionEvent.ACTION_CANCEL){
                          if(id==pointerJoy){ pointerJoy=-1; r.joyX=0; r.joyY=0; } if(id==pointerLook){ pointerLook=-1; }
                      }
                      return true;
                  }
                  float clamp(float v){return Math.max(-1,Math.min(1,v));}
              }

              public static class VoxelRenderer implements GLSurfaceView.Renderer {
                  final Context ctx; SharedPreferences sp;
                  int program, aPos, aCol, uMvp, width=1, height=1, edits=0;
                  final float[] proj=new float[16], view=new float[16], vp=new float[16], model=new float[16], mvp=new float[16];
                  final int world=48; final int[][] heightMap=new int[world][world]; final int[][] typeMap=new int[world][world];
                  float camX=24, camY=7.5f, camZ=24, yaw=.6f, pitch=-.18f, joyX=0, joyY=0, vy=0, day=.25f, health=20, hunger=20;
                  boolean started=false, paused=false, onGround=true; long last=0;
                  final int[] hotbar={1,2,3,4,5,6,7,8}; int selected=0;
                  FloatBuffer buffer; int vertexCount=0;
                  public VoxelRenderer(Context c){ ctx=c; sp=c.getSharedPreferences("v3",0); load(); generateWorld(); }
                  void load(){ camX=sp.getFloat("x",24); camZ=sp.getFloat("z",24); yaw=sp.getFloat("yaw",.6f); selected=sp.getInt("sel",0); }
                  void save(){ sp.edit().putFloat("x",camX).putFloat("z",camZ).putFloat("yaw",yaw).putInt("sel",selected).apply(); }
                  void generateWorld(){
                      Random rnd=new Random(2027);
                      for(int x=0;x<world;x++) for(int z=0;z<world;z++){
                          float nx=(x-world/2f)*.18f, nz=(z-world/2f)*.18f;
                          int h=2+(int)(2.4f*Math.sin(nx)+2.1f*Math.cos(nz)+1.3f*Math.sin((nx+nz)*.7f));
                          h=Math.max(1,Math.min(8,h)); heightMap[x][z]=h;
                          int t=1; if(h<=2)t=6; if(h>=6)t=3; if(rnd.nextInt(29)==0)t=7; if(rnd.nextInt(37)==0)t=8; typeMap[x][z]=t;
                          if(Math.abs(x-24)<3 && Math.abs(z-24)<3){ heightMap[x][z]=1; typeMap[x][z]=1; }
                      }
                  }
                  @Override public void onSurfaceCreated(GL10 gl,EGLConfig cfg){
                      GLES20.glClearColor(.45f,.68f,.96f,1); GLES20.glEnable(GLES20.GL_DEPTH_TEST); GLES20.glEnable(GLES20.GL_CULL_FACE); GLES20.glCullFace(GLES20.GL_BACK);
                      program=makeProgram(VS,FS); aPos=GLES20.glGetAttribLocation(program,"aPos"); aCol=GLES20.glGetAttribLocation(program,"aCol"); uMvp=GLES20.glGetUniformLocation(program,"uMVP");
                  }
                  @Override public void onSurfaceChanged(GL10 gl,int w,int h){ width=Math.max(1,w); height=Math.max(1,h); GLES20.glViewport(0,0,width,height); Matrix.perspectiveM(proj,0,67f,width/(float)height,.08f,95f); }
                  @Override public void onDrawFrame(GL10 gl){ update(); render(); }
                  void update(){
                      long now=System.nanoTime(); float dt=last==0?.016f:Math.min(.05f,(now-last)/1e9f); last=now; if(!started||paused)return;
                      day+=dt/210f; if(day>1)day-=1; hunger=Math.max(0,hunger-dt*.013f); if(hunger<=0)health=Math.max(0,health-dt*.05f);
                      float speed=(hunger>0?4.5f:2.6f)*dt; float sx=(float)Math.sin(yaw), cx=(float)Math.cos(yaw);
                      float nx=camX+(sx*-joyY+cx*joyX)*speed; float nz=camZ+(cx*-joyY-sx*joyX)*speed;
                      if(walkable(nx,camZ))camX=nx; if(walkable(camX,nz))camZ=nz;
                      vy-=9.8f*dt; camY+=vy*dt; float ground=groundY(camX,camZ)+1.75f; if(camY<ground){ if(vy<-8) health=Math.max(0,health+vy*.18f); camY=ground; vy=0; onGround=true; }
                  }
                  boolean walkable(float x,float z){ if(x<1||z<1||x>world-2||z>world-2)return false; return groundY(x,z)<camY+.2f; }
                  float groundY(float x,float z){ int ix=Math.max(0,Math.min(world-1,(int)x)); int iz=Math.max(0,Math.min(world-1,(int)z)); return heightMap[ix][iz]; }
                  void jump(){ if(onGround){ vy=5.9f; onGround=false; } }
                  void breakBlock(){ int[] b=targetCell(); if(b!=null && heightMap[b[0]][b[1]]>0){ heightMap[b[0]][b[1]]--; edits++; } }
                  void placeBlock(){ int[] b=targetCell(); if(b!=null && heightMap[b[0]][b[1]]<12){ heightMap[b[0]][b[1]]++; typeMap[b[0]][b[1]]=hotbar[selected]; edits++; } }
                  int[] targetCell(){ float dx=(float)(Math.sin(yaw)*Math.cos(pitch)); float dz=(float)(-Math.cos(yaw)*Math.cos(pitch)); for(float d=1.2f;d<7;d+=.2f){ int x=(int)(camX+dx*d), z=(int)(camZ+dz*d); if(x>0&&z>0&&x<world&&z<world) return new int[]{x,z}; } return null; }
                  void render(){
                      float light=.55f+.45f*(float)Math.sin(day*6.283f); GLES20.glClearColor(.22f+.32f*light,.34f+.36f*light,.50f+.42f*light,1); GLES20.glClear(GLES20.GL_COLOR_BUFFER_BIT|GLES20.GL_DEPTH_BUFFER_BIT);
                      float lx=(float)(Math.sin(yaw)*Math.cos(pitch)), ly=(float)Math.sin(pitch), lz=(float)(-Math.cos(yaw)*Math.cos(pitch));
                      Matrix.setLookAtM(view,0,camX,camY,camZ,camX+lx,camY+ly,camZ+lz,0,1,0); Matrix.multiplyMM(vp,0,proj,0,view,0); Matrix.setIdentityM(model,0); Matrix.multiplyMM(mvp,0,vp,0,model,0);
                      buildMesh(light); GLES20.glUseProgram(program); GLES20.glUniformMatrix4fv(uMvp,1,false,mvp,0);
                      buffer.position(0); GLES20.glVertexAttribPointer(aPos,3,GLES20.GL_FLOAT,false,28,buffer); GLES20.glEnableVertexAttribArray(aPos);
                      buffer.position(3); GLES20.glVertexAttribPointer(aCol,4,GLES20.GL_FLOAT,false,28,buffer); GLES20.glEnableVertexAttribArray(aCol);
                      GLES20.glDrawArrays(GLES20.GL_TRIANGLES,0,vertexCount);
                  }
                  void buildMesh(float light){
                      float[] data=new float[world*world*36*7]; int[] idx={0}; int minX=Math.max(0,(int)camX-22), maxX=Math.min(world-1,(int)camX+22), minZ=Math.max(0,(int)camZ-22), maxZ=Math.min(world-1,(int)camZ+22);
                      for(int x=minX;x<=maxX;x++) for(int z=minZ;z<=maxZ;z++){ int h=heightMap[x][z]; int t=typeMap[x][z]; addColumn(data,idx,x,0,z,h,t,light); }
                      vertexCount=idx[0]/7; buffer=ByteBuffer.allocateDirect(idx[0]*4).order(ByteOrder.nativeOrder()).asFloatBuffer(); buffer.put(data,0,idx[0]); buffer.position(0);
                  }
                  void addColumn(float[] d,int[] idx,float x,float y,float z,float height,int type,float light){
                      if(height<=0)return; float[] c=color(type,light); float x0=x,x1=x+1,y0=y,y1=y+height,z0=z,z1=z+1;
                      face(d,idx,c,.95f, x0,y1,z0, x1,y1,z0, x1,y1,z1, x0,y1,z1);
                      face(d,idx,c,.55f, x0,y0,z1, x1,y0,z1, x1,y0,z0, x0,y0,z0);
                      face(d,idx,c,.75f, x0,y0,z0, x0,y1,z0, x0,y1,z1, x0,y0,z1);
                      face(d,idx,c,.82f, x1,y0,z1, x1,y1,z1, x1,y1,z0, x1,y0,z0);
                      face(d,idx,c,.68f, x1,y0,z0, x1,y1,z0, x0,y1,z0, x0,y0,z0);
                      face(d,idx,c,.88f, x0,y0,z1, x0,y1,z1, x1,y1,z1, x1,y0,z1);
                  }
                  void face(float[] d,int[] idx,float[] c,float s,float...v){ put(d,idx,v[0],v[1],v[2],c,s); put(d,idx,v[3],v[4],v[5],c,s); put(d,idx,v[6],v[7],v[8],c,s); put(d,idx,v[0],v[1],v[2],c,s); put(d,idx,v[6],v[7],v[8],c,s); put(d,idx,v[9],v[10],v[11],c,s); }
                  void put(float[] d,int[] i,float x,float y,float z,float[] c,float s){ int k=i[0]; d[k++]=x; d[k++]=y; d[k++]=z; d[k++]=c[0]*s; d[k++]=c[1]*s; d[k++]=c[2]*s; d[k++]=1; i[0]=k; }
                  int blockColor(int b){ float[] c=color(b,1); return Color.rgb((int)(c[0]*255),(int)(c[1]*255),(int)(c[2]*255)); }
                  float[] color(int b,float l){ int col; switch(b){case 1:col=Color.rgb(72,190,77);break;case 2:col=Color.rgb(128,86,50);break;case 3:col=Color.rgb(128,132,138);break;case 4:col=Color.rgb(132,90,48);break;case 5:col=Color.rgb(62,155,73);break;case 6:col=Color.rgb(220,198,126);break;case 7:col=Color.rgb(65,150,230);break;case 8:col=Color.rgb(64,120,165);break;default:col=Color.rgb(200,200,200);} return new float[]{Color.red(col)/255f*l,Color.green(col)/255f*l,Color.blue(col)/255f*l}; }
                  int shader(int type,String src){ int s=GLES20.glCreateShader(type); GLES20.glShaderSource(s,src); GLES20.glCompileShader(s); return s; }
                  int makeProgram(String vs,String fs){ int p=GLES20.glCreateProgram(); GLES20.glAttachShader(p,shader(GLES20.GL_VERTEX_SHADER,vs)); GLES20.glAttachShader(p,shader(GLES20.GL_FRAGMENT_SHADER,fs)); GLES20.glLinkProgram(p); return p; }
                  static final String VS="attribute vec3 aPos;attribute vec4 aCol;uniform mat4 uMVP;varying vec4 vCol;void main(){vCol=aCol;gl_Position=uMVP*vec4(aPos,1.0);}";
                  static final String FS="precision mediump float;varying vec4 vCol;void main(){gl_FragColor=vCol;}";
              }
          }
          EOF

          # Real original generated content pack: procedural textures + ambience metadata.
          # Kept around 30 MB because huge 300 MB APKs install slowly and do not make the game better.
          python3 - <<'PY'
          import os, math, random, struct, wave
          base='VoxelForgeV3/app/src/main/assets/pack'
          os.makedirs(base, exist_ok=True)
          random.seed(2027)
          # Generate procedural sound loops that are actual usable original assets, not zero padding.
          for name, freq in [('wind',110),('step',72),('break',180),('place',95),('night',55),('water',130)]:
              path=os.path.join(base,name+'.wav')
              rate=22050; secs=8
              with wave.open(path,'w') as w:
                  w.setnchannels(1); w.setsampwidth(2); w.setframerate(rate)
                  frames=[]
                  for i in range(rate*secs):
                      t=i/rate
                      val=0.25*math.sin(t*freq*math.pi*2)+0.08*math.sin(t*(freq*1.7)*math.pi*2)+0.04*(random.random()*2-1)
                      frames.append(struct.pack('<h', int(max(-1,min(1,val))*18000)))
                  w.writeframes(b''.join(frames))
          # Texture pack data used as a named original pack; generated noise + block color maps.
          with open(os.path.join(base,'procedural_texture_pack_v3.vfpack'),'wb') as f:
              for block in range(64):
                  for y in range(256):
                      for x in range(256):
                          r=(block*37+x*3+y*2+random.randint(0,22))&255
                          g=(block*53+x+y*4+random.randint(0,22))&255
                          b=(block*19+x*2+y*5+random.randint(0,22))&255
                          f.write(bytes([r,g,b,255]))
          PY

      - name: Build V3 APK
        run: gradle -p VoxelForgeV3 :app:assembleDebug --stacktrace --no-daemon

      - name: Upload V3 APK
        uses: actions/upload-artifact@v4
        with:
          name: VoxelForge-V3-OpenGL-apk
          path: VoxelForgeV3/app/build/outputs/apk/debug/*.apk
