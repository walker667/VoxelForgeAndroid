name: BUILD DIRECT APK NO ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Create tiny safe Android game
        run: |
          mkdir -p ForgeLite/app/src/main/java/com/example/voxelforge
          mkdir -p ForgeLite/app/src/main/res/values
          cat > ForgeLite/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='ForgeLite'
          include ':app'
          EOF
          cat > ForgeLite/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.12.2' apply false }
          EOF
          cat > ForgeLite/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.example.voxelforge'; compileSdk 35
            defaultConfig { applicationId 'com.example.voxelforge'; minSdk 23; targetSdk 35; versionCode 3; versionName '1.2-direct-safe' }
          }
          EOF
          cat > ForgeLite/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">Voxel Forge Lite</string></resources>
          EOF
          cat > ForgeLite/app/src/main/res/values/styles.xml <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"><item name="android:windowFullscreen">true</item><item name="android:windowNoTitle">true</item><item name="android:windowDisablePreview">true</item></style></resources>
          EOF
          cat > ForgeLite/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme" android:label="@string/app_name" android:allowBackup="false"><activity android:name=".MainActivity" android:screenOrientation="landscape" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF
          cat > ForgeLite/app/src/main/java/com/example/voxelforge/MainActivity.java <<'EOF'
          package com.example.voxelforge;
          import android.app.*;import android.os.*;import android.view.*;import android.graphics.*;import android.content.*;import java.util.*;
          public class MainActivity extends Activity{GameView v;public void onCreate(Bundle b){super.onCreate(b);requestWindowFeature(Window.FEATURE_NO_TITLE);getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);v=new GameView(this);setContentView(v);}public void onPause(){if(v!=null)v.save();super.onPause();}
          static class GameView extends View{Paint p=new Paint(1),t=new Paint(1);Random r=new Random(4);HashMap<Long,Integer> blocks=new HashMap<>();int mode=0,sel=1;float x=0,y=0,ang=0,hp=20,food=20,day=.2f,mx,my;boolean moving=false;RectF play=new RectF(),brk=new RectF(),plc=new RectF(),jmp=new RectF();SharedPreferences sp;long last;
          GameView(Context c){super(c);setFocusable(true);sp=c.getSharedPreferences("world",0);x=sp.getFloat("x",0);y=sp.getFloat("y",0);ang=sp.getFloat("a",0);t.setTextAlign(Paint.Align.CENTER);}
          void save(){sp.edit().putFloat("x",x).putFloat("y",y).putFloat("a",ang).apply();}
          protected void onDraw(Canvas c){float dt=.016f;long n=System.nanoTime();if(last>0)dt=Math.min(.05f,(n-last)/1e9f);last=n;if(mode==1)update(dt);draw(c);invalidate();}
          void update(float dt){day+=dt/260f;if(day>1)day-=1;if(moving){float s=3*dt;x+=(float)Math.cos(ang)*my*s+(float)Math.sin(ang)*mx*s;y+=(float)Math.sin(ang)*my*s-(float)Math.cos(ang)*mx*s;food=Math.max(0,food-dt*.02f);}}
          void draw(Canvas c){int w=getWidth(),h=getHeight();if(mode==0){p.setColor(Color.rgb(20,35,55));c.drawRect(0,0,w,h,p);t.setColor(Color.WHITE);t.setTextSize(54);c.drawText("Voxel Forge Lite",w/2,h*.28f,t);t.setTextSize(24);c.drawText("safe Android APK build",w/2,h*.36f,t);play.set(w/2-170,h*.5f,w/2+170,h*.5f+75);button(c,play,"PLAY",Color.rgb(55,145,85));return;}float l=Math.max(.25f,(float)Math.sin(day*6.28f)*.5f+.55f);p.setColor(Color.rgb((int)(80*l),(int)(150*l),230));c.drawRect(0,0,w,h/2,p);p.setColor(Color.rgb(45,(int)(120*l),55));c.drawRect(0,h/2,w,h,p);for(int i=0;i<120;i++){float a=ang+(i/119f-.5f)*1.2f;Ray q=ray(a);if(q.hit){float ww=w/120f+1,dh=h/(q.d+.4f);p.setColor(color(q.b,l/(q.d*.08f+1)));c.drawRect(i*ww,h/2-dh/2,(i+1)*ww+1,h/2+dh/2,p);}}hud(c,w,h);} 
          void hud(Canvas c,int w,int h){p.setColor(Color.WHITE);c.drawCircle(95,h-95,65,p);p.setColor(Color.rgb(60,80,100));c.drawCircle(95+mx*45,h-95+my*45,28,p);brk.set(w-250,h-95,w-160,h-20);plc.set(w-145,h-95,w-55,h-20);jmp.set(w-145,h-185,w-55,h-110);button(c,brk,"BREAK",Color.rgb(150,70,55));button(c,plc,"PLACE",Color.rgb(65,135,75));button(c,jmp,"JUMP",Color.rgb(65,100,160));bar(c,20,20,hp/20,Color.RED,"HP");bar(c,20,48,food/20,Color.rgb(240,170,50),"FOOD");t.setColor(Color.WHITE);t.setTextSize(18);c.drawText("drag right side to look - tap place/break",w/2,32,t);} 
          void button(Canvas c,RectF r,String s,int col){p.setColor(col);c.drawRoundRect(r,14,14,p);t.setColor(Color.WHITE);t.setTextSize(20);c.drawText(s,r.centerX(),r.centerY()+7,t);}void bar(Canvas c,int x,int y,float v,int col,String s){p.setColor(Color.DKGRAY);c.drawRect(x,y,x+150,y+18,p);p.setColor(col);c.drawRect(x,y,x+150*Math.max(0,Math.min(1,v)),y+18,p);t.setTextSize(14);t.setColor(Color.WHITE);t.setTextAlign(Paint.Align.LEFT);c.drawText(s,x+160,y+15,t);t.setTextAlign(Paint.Align.CENTER);} 
          public boolean onTouchEvent(android.view.MotionEvent e){int a=e.getActionMasked();float xx=e.getX(),yy=e.getY();if(mode==0&&a==0&&play.contains(xx,yy)){mode=1;return true;}if(mode==1){if(a==0){if(brk.contains(xx,yy)){Ray q=ray(ang);if(q.hit)blocks.put(key(q.x,q.y),0);}else if(plc.contains(xx,yy)){int bx=(int)(x+Math.cos(ang)*2),by=(int)(y+Math.sin(ang)*2);blocks.put(key(bx,by),1);}else moving=xx<getWidth()*.4f;}if(a==2){if(xx<getWidth()*.4f&&moving){mx=Math.max(-1,Math.min(1,(xx-95)/65));my=Math.max(-1,Math.min(1,(yy-(getHeight()-95))/65));}else ang+=(xx-getWidth()/2)*.00003f;}if(a==1||a==3){moving=false;mx=my=0;}}return true;} 
          Ray ray(float a){Ray q=new Ray();for(float d=.1f;d<16;d+=.08f){int bx=(int)Math.floor(x+Math.cos(a)*d),by=(int)Math.floor(y+Math.sin(a)*d);int b=block(bx,by);if(b!=0){q.hit=true;q.x=bx;q.y=by;q.b=b;q.d=d;return q;}}return q;}int block(int bx,int by){Integer e=blocks.get(key(bx,by));if(e!=null)return e;int n=bx*734287+by*912271;if(Math.abs((bx+by*2)%11)<2)return 2;if((n^(n>>13))%17==0)return 3;if((n^(n>>8))%23==0)return 4;return 0;}long key(int a,int b){return(((long)a)<<32)^(b&0xffffffffL);}int color(int b,float l){l=Math.max(.2f,Math.min(1,l));int base=b==2?Color.rgb(80,170,80):b==3?Color.rgb(120,120,125):b==4?Color.rgb(140,90,45):Color.rgb(80,180,90);return Color.rgb((int)(Color.red(base)*l),(int)(Color.green(base)*l),(int)(Color.blue(base)*l));}static class Ray{boolean hit;int x,y,b;float d;}}
          }
          EOF

      - name: Build direct APK
        run: gradle -p ForgeLite :app:assembleDebug --stacktrace --no-daemon

      - name: Upload direct APK
        uses: actions/upload-artifact@v4
        with:
          name: DIRECT-SAFE-VoxelForge-apk
          path: ForgeLite/app/build/outputs/apk/debug/*.apk
